<head>

<title>Reymark Aguila | Full Stack Developer</title>

<link rel="manifest" href="manifest.json">

<style>
:root{scroll-behavior:smooth;--grad:linear-gradient(135deg,#6f42c1,#0d6efd,#20c997)}body{overflow-x:hidden}.gradient{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hero{min-height:100vh;display:flex;align-items:center;position:relative}.hero:before{content:'';position:absolute;inset:-20%;background:radial-gradient(circle at 20% 20%,rgba(111,66,193,.35),transparent 30%),radial-gradient(circle at 80% 30%,rgba(13,110,253,.25),transparent 30%),radial-gradient(circle at 50% 80%,rgba(32,201,151,.25),transparent 30%);filter:blur(45px);animation:float 12s ease-in-out infinite alternate}.glass{background:rgba(255,255,255,.08);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12)}.card{border:0;transition:.3s}.card:hover{transform:translateY(-10px);box-shadow:0 1rem 3rem rgba(0,0,0,.15)}.chip{display:inline-block;padding:.45rem .8rem;border-radius:999px;background:var(--bs-tertiary-bg);margin:.25rem}.reveal{opacity:0;transform:translateY(28px);transition:.8s}.reveal.show{opacity:1;transform:none}.timeline{border-left:3px solid var(--bs-border-color);padding-left:1.2rem}.timeline-item{position:relative;margin-bottom:1.5rem}.timeline-item:before{content:'';position:absolute;left:-1.58rem;top:.35rem;width:12px;height:12px;border-radius:50%;background:#0d6efd}@keyframes float{from{transform:translateY(-20px)}to{transform:translateY(25px)}}
</style></head><body>
<nav class="navbar navbar-expand-lg sticky-top bg-body-tertiary border-bottom"><div class="container"><a class="navbar-brand fw-bold gradient" href="#home" id="brand">Portfolio</a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button><div id="nav" class="collapse navbar-collapse"><ul class="navbar-nav ms-auto gap-2"><li class="nav-item"><a class="nav-link" href="#about">About</a></li><li class="nav-item"><a class="nav-link" href="#experience">Experience</a></li><li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li><li class="nav-item dropdown"><button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">Theme</button><ul class="dropdown-menu dropdown-menu-end"><li><button class="dropdown-item" data-theme="auto">Auto</button></li><li><button class="dropdown-item" data-theme="light">Light</button></li><li><button class="dropdown-item" data-theme="dark">Dark</button></li></ul></li></ul></div></div></nav>
<section id="home" class="hero"><div class="container position-relative"><div class="row g-5 align-items-center"><div class="col-lg-7 reveal"><h1 class="display-2 fw-bold" id="name"></h1><h2 class="gradient fw-bold" id="typing"></h2><p class="lead text-secondary" id="aboutText"></p><div class="d-flex gap-2 flex-wrap"><a id="github" class="btn btn-dark">GitHub</a><a id="linkedin" class="btn btn-primary">LinkedIn</a><a id="facebook" class="btn btn-outline-primary">Facebook</a><a href="#projects" class="btn btn-success">Contact Me</a></div></div><div class="col-lg-5 text-center reveal"><div class="glass rounded-5 p-3"><img src="resources/images/reymark.png" class="img-fluid rounded-5 shadow-lg" onerror="this.src='resources/images/profile.png'"></div></div></div></div></section>
<section id="about" class="container py-5 reveal"><h2>About Me</h2><p id="about2"></p></section>
<section id="experience" class="container py-5 reveal"><h2>Experience</h2><div id="expList" class="timeline"></div></section>
<section class="container py-5 reveal"><h2>Skills</h2><div id="skillsWrap"></div></section><section class="container py-5 reveal"><h2>Achievements</h2><div id="accList" class="row g-4"></div></section>
<section id="contact" class="container py-5 reveal"><div class="p-5 rounded-5 bg-body-tertiary"><h2>Let's Work Together</h2><p id="contactDes"></p><div id="contactList"></div></div></section>
<footer class="py-4 text-center text-secondary">© 2026 Reymark Aguila</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function setTheme(t){localStorage.setItem('theme',t);document.documentElement.setAttribute('data-bs-theme',t==='auto'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):t)}setTheme(localStorage.getItem('theme')||'auto');document.querySelectorAll('[data-theme]').forEach(x=>x.onclick=()=>setTheme(x.dataset.theme));
const roles=['Full Stack Developer','UI/UX Builder','Cloud Ready Engineer','Problem Solver'];let ri=0;setInterval(()=>typing.textContent=roles[ri=(ri+1)%roles.length],2200);
fetch('resources/data.json').then(r=>r.json()).then(d=>{brand.textContent=d.name;name.textContent=d.name;typing.textContent=d.role;aboutText.innerHTML=d.about;about2.innerHTML=d.about;github.href=d.github;linkedin.href=d.linkedin;facebook.href=d.facebook;contactDes.innerHTML=d.contactDes;expList.innerHTML=d.experience.map(x=>`<div class='timeline-item'><div class='row g-3 align-items-center'><div class='col-md-2'><img src='resources/images/${x.image||x.company.toLowerCase().replace(/[^a-z0-9]/g,'')+`.png`}' class='img-fluid rounded shadow-sm' onerror='this.style.display="none"'></div><div class='col-md-10'><h5>${x.role}</h5><div class='fw-semibold'>${x.company}</div><small class='text-secondary'>${x.dtStart} - ${x.dtEnd}</small><div>${x.loc}</div></div></div></div>`).join('');skillsWrap.innerHTML=d.skills.map(s=>{let icon='💻';let t=s.toLowerCase();if(t.includes('html'))icon='🌐';else if(t.includes('css'))icon='🎨';else if(t.includes('javascript'))icon='⚡';else if(t.includes('bootstrap'))icon='🅱️';else if(t.includes('.net')||t.includes('c#'))icon='⚙️';else if(t.includes('sql'))icon='🗄️';else if(t.includes('azure'))icon='☁️';return `<span class='chip fs-6'>${icon} ${s}</span>`}).join('');accList.innerHTML=d.accomplishments.map(a=>`<div class='col-md-6'><div class='card h-100 p-4'><h5>${a.title}</h5><p class='text-secondary mb-0'>${a.description}</p></div></div>`).join('');contactList.innerHTML=d.contactInfo.map(c=>`<div class='mb-2'><a href='${c.link}' class='text-decoration-none'>${c.contact}</a></div>`).join('')});const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')}),{threshold:.12});document.querySelectorAll('.reveal').forEach(el=>io.observe(el));if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});} </script></body></html>
