<!doctype html>
<html lang="en" data-bs-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reymark Aguila | Elite Portfolio</title>
<meta name="description" content="Elite FAANG-level developer portfolio">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-GM7L425MDL"></script>
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());
gtag('config','G-GM7L425MDL');
</script>

<style>
:root{
  --bg:#0b0f17;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#22c55e;
}

body{
  font-family:Inter,system-ui;
  background:var(--bs-body-bg);
  overflow-x:hidden;
}

/* FAANG STYLE BACKGROUND */
.bg-hero{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 20%,rgba(34,197,94,.15),transparent 40%),
             radial-gradient(circle at 80% 80%,rgba(59,130,246,.12),transparent 40%);
  z-index:-1;
}

/* TYPOGRAPHY */
h1,h2,h3{letter-spacing:-.02em}
.gradient{
  background:linear-gradient(90deg,#22c55e,#3b82f6,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARDS */
.cardx{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  backdrop-filter:blur(10px);
  padding:24px;
  transition:.3s;
}
.cardx:hover{transform:translateY(-8px)}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
}
.hero-img{
  width:360px;
  height:360px;
  object-fit:cover;
  border-radius:30px;
  box-shadow:0 30px 80px rgba(0,0,0,.4);
  animation:float 6s ease-in-out infinite;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
  100%{transform:translateY(0)}
}

/* EXPERIENCE */
.exp-logo{
  width:56px;
  height:56px;
  border-radius:12px;
  object-fit:cover;
}

/* ACCOMPLISHMENTS */
.acc-img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:14px;
}

/* SKILLS */
.skill{
  display:inline-flex;
  gap:6px;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  margin:4px;
  font-weight:500;
}

/* REVEAL */
.reveal{opacity:0;transform:translateY(20px);transition:.8s}
.reveal.show{opacity:1;transform:none}

/* NAV */
.navbar{backdrop-filter:blur(10px)}
</style>
</head>
<body>

<div class="bg-hero"></div>

<nav class="navbar navbar-expand-lg fixed-top border-bottom">
<div class="container">
<a class="navbar-brand fw-bold gradient" href="#home">Portfolio</a>

<div class="ms-auto d-flex gap-2">
<button class="btn btn-sm btn-outline-light" data-theme="auto">Auto</button>
<button class="btn btn-sm btn-outline-light" data-theme="light">Light</button>
<button class="btn btn-sm btn-outline-light" data-theme="dark">Dark</button>
</div>
</div>
</nav>

<section id="home" class="hero">
<div class="container">
<div class="row align-items-center g-5">

<div class="col-lg-7 reveal">
<h1 class="display-3 fw-bold" id="name"></h1>
<h2 class="gradient fw-bold" id="role"></h2>
<p class="text-secondary" id="aboutTop"></p>

<div class="d-flex gap-2 flex-wrap">
<a id="github" class="btn btn-dark">GitHub</a>
<a id="linkedin" class="btn btn-dark">LinkedIn</a>
<a id="facebook" class="btn btn-dark">Facebook</a>
<button id="resumeBtn" class="btn btn-success">Download Resume</button>
</div>
</div>

<div class="col-lg-5 text-center reveal">
<img src="resources/images/profile.jpg" class="hero-img" onerror="this.src='resources/images/profile.png'">
</div>

</div>
</div>
</section>

<section class="container my-5">
<div class="cardx reveal">
<h2>About</h2>
<div id="about"></div>
</div>
</section>

<section class="container my-5">
<div class="cardx reveal">
<h2>Experience</h2>
<div id="exp"></div>
</div>
</section>

<section class="container my-5">
<div class="cardx reveal">
<h2>Skills</h2>
<div id="skillsWrap"></div>
</div>
</section>

<section class="container my-5">
<div class="cardx reveal">
<h2>Accomplishments</h2>
<div id="acc" class="row g-3"></div>
</div>
</section>

<section class="container my-5">
<div class="cardx reveal">
<h2>Contact</h2>
<div id="contacts" class="row g-3"></div>
</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let pdata;

/* THEME */
function setTheme(v){
localStorage.setItem('theme',v);
document.documentElement.setAttribute('data-bs-theme',v==='auto'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):v);
}
setTheme(localStorage.getItem('theme')||'auto');
document.querySelectorAll('[data-theme]').forEach(b=>b.onclick=()=>setTheme(b.dataset.theme));

/* EXPERIENCE YEARS */
function duration(s,e){let a=new Date(s),b=e?new Date(e):new Date();let m=(b-a)/2629800000;return Math.floor(m/12)+'y '+Math.floor(m%12)+'m'}

fetch('resources/data.json').then(r=>r.json()).then(d=>{
pdata=d;
name.textContent=d.name;
role.textContent=d.role;
aboutTop.innerHTML=d.about;
document.getElementById('about').innerHTML=d.about;
github.href=d.github;
linkedin.href=d.linkedin;
facebook.href=d.facebook;

exp.innerHTML=d.experience.map((x,i)=>`
<div class='d-flex gap-3 mb-3 align-items-center'>
<img class='exp-logo' src='resources/images/experience/${i+1}.jpg'>
<div>
<h5>${x.role}</h5>
<div class='text-secondary'>${x.company} • ${duration(x.dtStart,x.dtEnd)}</div>
</div></div>`).join('');

skillsWrap.innerHTML=d.skills.map(s=>`<span class='skill'>⚡ ${s}</span>`).join('');

acc.innerHTML=(d.accomplishments||[]).map((a,i)=>`
<div class='col-md-4'>
<div class='cardx'>
<img class='acc-img mb-2' src='resources/images/accomplishments/${i+1}.jpg'>
<h6>${a.title}</h6>
<small class='text-secondary'>${a.description}</small>
</div></div>`).join('');

contacts.innerHTML=d.contactInfo.map(c=>`
<div class='col-md-4'><div class='cardx text-center'>${c.contact}</div></div>`).join('');
});

/* RESUME */
document.getElementById('resumeBtn').onclick=()=>{
if(!pdata)return;
let w=window.open('');
w.document.write(`<html><body style='font-family:Inter;padding:30px'>
<h1>${pdata.name}</h1><h3>${pdata.role}</h3>
<p>${pdata.about}</p><hr>
<h2>Experience</h2>
${pdata.experience.map(x=>`<p><b>${x.role}</b> (${duration(x.dtStart,x.dtEnd)})<br>${x.company}</p>`).join('')}
<hr>
<h2>Skills</h2>${pdata.skills.join(', ')}
<hr>
<h2>Contact</h2>${pdata.contactInfo.map(c=>c.contact).join('<br>')}
</body></html>`);
w.document.close();setTimeout(()=>w.print(),600);
};

/* REVEAL */
const io=new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('show')),{threshold:.1});
document.querySelectorAll('.reveal').forEach(e=>io.observe(e));
</script>
</body>
</html>
