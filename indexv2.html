<!doctype html>

<html lang="en" data-bs-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Reymark Aguila Portfolio">
<title>Reymark Aguila | Portfolio</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GM7L425MDL"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-GM7L425MDL');</script>
<style>
:root{scroll-behavior:smooth;--grad:linear-gradient(135deg,#6f42c1,#0d6efd,#20c997)}
body{overflow-x:hidden}
.gradient{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero{min-height:100vh;display:flex;align-items:center;background:radial-gradient(circle at top right,rgba(13,110,253,.15),transparent 35%),radial-gradient(circle at left bottom,rgba(111,66,193,.15),transparent 35%)}
.hero-photo{max-width:420px;border-radius:2rem;box-shadow:0 1.5rem 4rem rgba(0,0,0,.2)}
.card{border:0;transition:.25s}
.card:hover{transform:translateY(-8px);box-shadow:0 1rem 2rem rgba(0,0,0,.12)}
.skill{display:inline-block;padding:.5rem .85rem;margin:.25rem;border-radius:999px;background:var(--bs-tertiary-bg);font-weight:600}
.timeline{border-left:3px solid var(--bs-border-color);padding-left:1.25rem}
.item{position:relative;margin-bottom:1.5rem}
.item:before{content:'';position:absolute;left:-1.62rem;top:.35rem;width:12px;height:12px;border-radius:50%;background:#0d6efd}
.reveal{opacity:0;transform:translateY(20px);transition:.7s}
.reveal.show{opacity:1;transform:none}
</style>
</head>
<body><nav class="navbar navbar-expand-lg sticky-top bg-body-tertiary border-bottom">
<div class="container">
<a class="navbar-brand fw-bold gradient" href="#home" id="brand">Portfolio</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto gap-2">
<li class="nav-item"><a class="nav-link" href="#about">About</a></li>
<li class="nav-item"><a class="nav-link" href="#experience">Experience</a></li>
<li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
<li class="nav-item dropdown"><button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">Theme</button><ul class="dropdown-menu dropdown-menu-end"><li><button class="dropdown-item theme" data-v="auto">Auto</button></li><li><button class="dropdown-item theme" data-v="light">Light</button></li><li><button class="dropdown-item theme" data-v="dark">Dark</button></li></ul></li>
</ul>
</div>
</div>
</nav><section id="home" class="hero">
<div class="container">
<div class="row g-5 align-items-center"><div class="col-lg-7 reveal">
<h1 class="display-3 fw-bold" id="name"></h1>
<h2 class="gradient fw-bold" id="role"></h2>
<div class="lead text-secondary mb-4" id="aboutTop"></div>
<div class="d-flex gap-2 flex-wrap">
<a id="github" class="btn btn-dark">GitHub</a>
<a id="linkedin" class="btn btn-primary">LinkedIn</a>
<button id="resumeBtn" class="btn btn-success">Download Resume</button>
</div>
</div><div class="col-lg-5 text-center reveal">
<img src="resources/images/profile.jpg" class="img-fluid hero-photo" onerror="this.src='resources/images/profile.png'">
</div></div>
</div>
</section><section class="container py-5 reveal">
<h2>About Me</h2>
<div id="about"></div>
</section><section id="experience" class="container py-5 reveal">
<h2>Experience</h2>
<div id="exp" class="timeline"></div>
</section><section id="skills" class="container py-5 reveal">
<h2>Skills</h2>
<div id="skillsWrap"></div>
</section><section class="container py-5 reveal">
<h2>Accomplishments</h2>
<div id="acc" class="row g-4"></div>
</section><section id="contact" class="container py-5 reveal">
<div class="p-5 rounded-5 bg-body-tertiary">
<h2>Contact</h2>
<div id="contactText"></div>
<div id="contacts" class="row g-3 mt-2"></div>
</div>
</section><footer class="py-4 text-center text-secondary">© 2026 Reymark Aguila</footer><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script>
function setTheme(v){localStorage.setItem('theme',v);document.documentElement.setAttribute('data-bs-theme',v==='auto'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):v)}
setTheme(localStorage.getItem('theme')||'auto');
document.querySelectorAll('.theme').forEach(x=>x.onclick=()=>setTheme(x.dataset.v));

let pdata=null;

fetch('resources/data.json').then(r=>r.json()).then(d=>{
  pdata=d;
  brand.textContent=d.name;
  name.textContent=d.name;
  role.textContent=d.role;
  aboutTop.innerHTML=d.about;
  document.getElementById('about').innerHTML=d.about;

  github.href=d.github;
  linkedin.href=d.linkedin;

  contactText.innerHTML=d.contactDes||'';

  exp.innerHTML=d.experience.map((x,i)=>
    `<div class="item">
      <div class="row g-3 align-items-center">
        <div class="col-md-2">
          <img class="img-fluid rounded shadow-sm"
          src="resources/images/experience/${i+1}.jpg"
          onerror="this.style.display='none'">
        </div>
        <div class="col-md-10">
          <h5>${x.role}</h5>
          <div class="fw-semibold">${x.company}</div>
          <small class="text-secondary">${x.dtStart} - ${x.dtEnd}</small>
          <div>${x.loc}</div>
        </div>
      </div>
    </div>`
  ).join('');

  skillsWrap.innerHTML=d.skills.map(s=>`<span class="skill">${s}</span>`).join('');

  acc.innerHTML=(d.accomplishments||[]).map((a,i)=>
    `<div class="col-md-6">
      <div class="card h-100 p-3">
        <img class="img-fluid rounded mb-2" src="resources/images/accomplishments/${i+1}.jpg" onerror="this.style.display='none'">
        <h5>${a.title}</h5>
        <p class="text-secondary mb-0">${a.description}</p>
      </div>
    </div>`
  ).join('');

  contacts.innerHTML=d.contactInfo.map(c=>
    `<div class="col-md-4">
      <a href="${c.link}" class="text-decoration-none">
        <div class="card h-100 p-3 text-center">${c.contact}</div>
      </a>
    </div>`
  ).join('');
});

// Resume generator
resumeBtn.onclick=function(){if(!pdata)return;
let w=window.open('','_blank');
let exp=pdata.experience.map(x=>`<p><b>${x.role}</b><br>${x.company}<br>${x.dtStart} - ${x.dtEnd}</p>`).join('');
let skills=pdata.skills.join(', ');
w.document.write(`<html><head><title>${pdata.name}</title></head><body style='font-family:Arial;padding:30px'>
<h1>${pdata.name}</h1><h3>${pdata.role}</h3>
<div>${pdata.about}</div><hr>
<h2>Experience</h2>${exp}<hr>
<h2>Skills</h2>${skills}
</body></html>`);
w.document.close();setTimeout(()=>w.print(),700);
};

const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')}),{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script></body>
</html>
