<!doctype html><html lang=en data-bs-theme=auto><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Reymark Aguila | Staff Portfolio</title><meta name=description content="Staff Engineer portfolio"><link href=https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css rel=stylesheet><link href=https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap rel=stylesheet><script async src=https://www.googletagmanager.com/gtag/js?id=G-GM7L425MDL></script><script>window.dataLayer=[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-GM7L425MDL')</script><style>body{font-family:Inter,system-ui;overflow-x:hidden}#progress{position:fixed;top:0;left:0;height:3px;background:#111;width:0;z-index:9999}.section{padding:70px 0}.cardx{background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:24px;transition:.25s}.cardx:hover{transform:translateY(-4px)}.hero{min-height:92vh;display:flex;align-items:center}.hero-img{width:340px;height:340px;object-fit:cover;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.08);animation:f 6s infinite}.exp-logo{width:48px;height:48px;border-radius:10px;object-fit:cover}.acc-img{width:100%;height:90px;object-fit:cover;border-radius:10px}.skill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;margin:3px;border-radius:999px;border:1px solid #e5e7eb;background:#fff;font-size:.9rem}h1,h2{letter-spacing:-.02em}.muted{color:#6b7280}.reveal{opacity:0;transform:translateY(14px);transition:.6s}.reveal.show{opacity:1;transform:none}@keyframes f{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}</style></head><body><div id=progress></div><nav class="navbar fixed-top bg-white border-bottom"><div class=container><a class=navbar-brand href=#>Portfolio</a><div class=ms-auto><button data-theme=auto>Auto</button><button data-theme=light>Light</button><button data-theme=dark>Dark</button></div></div></nav><section class=hero><div class=container><div class="row align-items-center g-5"><div class="col-lg-7 reveal"><h1 id=name></h1><h2 id=role class=muted></h2><p id=aboutTop></p><a id=github class="btn btn-dark btn-sm">Git</a> <a id=linkedin class="btn btn-dark btn-sm">Li</a> <a id=facebook class="btn btn-dark btn-sm">Fb</a> <button id=resumeBtn class="btn btn-success btn-sm">Resume</button></div><div class="col-lg-5 text-center reveal"><img src=resources/images/profile.jpg class=hero-img onerror="this.src='profile.png'"></div></div></div></section><section class=section><div class=container class=cardx><h2>About</h2><div id=about></div></div></section><section class=section><div class=container class=cardx><h2>Experience</h2><div id=exp></div></div></section><section class=section><div class=container class=cardx><h2>Skills</h2><div id=skillsWrap></div></div></section><section class=section><div class=container class=cardx><h2>Accomplishments</h2><div id=acc class="row g-3"></div></div></section><section class=section><div class=container class=cardx><h2>Contact</h2><div id=contacts class="row g-3"></div></div></section><script src=https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js></script><script>let p;function set(v){localStorage.theme=v;document.documentElement.setAttribute('data-bs-theme',v==='auto'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):v)}set(localStorage.theme||'auto');document.querySelectorAll('[data-theme]').forEach(b=>b.onclick=()=>set(b.dataset.theme));function d(s,e){let a=new Date(s),b=e?new Date(e):new Date();let m=(b-a)/2629800000;return Math.floor(m/12)+'y '+Math.floor(m%12)+'m'}fetch('resources/data.json').then(r=>r.json()).then(x=>{p=x;name.textContent=x.name;role.textContent=x.role;aboutTop.textContent=x.about;about.innerHTML=x.about;github.href=x.github;linkedin.href=x.linkedin;facebook.href=x.facebook;exp.innerHTML=x.experience.map((e,i)=>`<div class=d-flex><img class=exp-logo src=resources/images/experience/${i+1}.jpg><div><b>${e.role}</b><div class=muted>${e.company} • ${d(e.dtStart,e.dtEnd)}</div></div></div>`).join('');skillsWrap.innerHTML=x.skills.map(s=>`<span class=skill>${s}</span>`).join('');acc.innerHTML=(x.accomplishments||[]).map((a,i)=>`<div class=col-md-4><div class=cardx><img class=acc-img src=resources/images/accomplishments/${i+1}.jpg><b>${a.title}</b><div class=muted>${a.description}</div></div></div>`).join('');contacts.innerHTML=x.contactInfo.map(c=>`<div class=col-md-4><div class=cardx>${c.contact}</div></div>`).join('')});document.getElementById('resumeBtn').onclick=()=>{if(!p)return;let w=window.open('');w.document.write(`<html><body style="font-family:Inter;padding:30px"><h1>${p.name}</h1><p>${p.role}</p><hr>${p.experience.map(e=>`<p><b>${e.role}</b> ${e.company}</p>`).join('')}<hr>${p.skills.join(', ')}<hr>${p.contactInfo.map(c=>c.contact).join('<br>')}</body></html>`);w.document.close();setTimeout(()=>w.print(),500)};new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('show')),{threshold:.1}).observe(document.querySelectorAll('.reveal').forEach(()=>{}))</script></body></html>
