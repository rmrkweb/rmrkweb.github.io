<!doctype html>

<html lang="en" data-bs-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Reymark Aguila Portfolio">
<title>Reymark Aguila | Portfolio</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><script async src="https://www.googletagmanager.com/gtag/js?id=G-GM7L425MDL"></script><script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());
gtag('config','G-GM7L425MDL');
</script><style>
:root{
  scroll-behavior:smooth;
  --accent:#111827;
  --muted:#6b7280;
}

body{overflow-x:hidden;color:#111}

/* remove blue feel */
a{color:var(--accent)}
.btn-primary{background:var(--accent)!important;border-color:var(--accent)!important}
.btn-primary:hover{opacity:.9}

.gradient{
  background:linear-gradient(135deg,#111827,#374151,#6b7280);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  background:radial-gradient(circle at top right,rgba(17,24,39,.08),transparent 40%),
             radial-gradient(circle at left bottom,rgba(55,65,81,.08),transparent 40%);
}

.hero-photo{
  max-width:420px;
  border-radius:2rem;
  box-shadow:0 1.5rem 4rem rgba(0,0,0,.15);
}

.card{border:0;transition:.25s}
.card:hover{transform:translateY(-6px);box-shadow:0 1rem 2rem rgba(0,0,0,.1)}

.skill{
  display:inline-flex;
  align-items:center;
  gap:.4rem;
  padding:.45rem .75rem;
  margin:.25rem;
  border-radius:999px;
  background:#f3f4f6;
  font-weight:600;
  font-size:.9rem;
}

.timeline{border-left:3px solid #e5e7eb;padding-left:1.25rem}
.item{position:relative;margin-bottom:1.5rem}
.item:before{content:'';position:absolute;left:-1.6rem;top:.35rem;width:10px;height:10px;border-radius:50%;background:#111827}

/* EXPERIENCE LOGO FIX */
.exp-logo{
  width:56px;
  height:56px;
  object-fit:cover;
  border-radius:12px;
}

/* ACCOMPLISHMENT THUMBNAILS */
.acc-thumb{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
}

.reveal{opacity:0;transform:translateY(18px);transition:.7s}
.reveal.show{opacity:1;transform:none}

.contact-card{transition:.2s}
.contact-card:hover{transform:translateY(-5px)}
</style></head>
<body><nav class="navbar navbar-expand-lg sticky-top bg-body-tertiary border-bottom">
<div class="container">
<a class="navbar-brand fw-bold gradient" href="#home" id="brand">Portfolio</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"></button><div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto gap-2">
<li class="nav-item"><a class="nav-link" href="#about">About</a></li>
<li class="nav-item"><a class="nav-link" href="#experience">Experience</a></li>
<li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
</ul>
</div>
</div>
</nav><section id="home" class="hero">
<div class="container">
<div class="row g-5 align-items-center"><div class="col-lg-7 reveal">
<h1 class="display-3 fw-bold" id="name"></h1>
<h2 class="gradient fw-bold" id="role"></h2>
<p class="text-secondary" id="aboutTop"></p><div class="d-flex gap-2 flex-wrap">
<a id="github" class="btn btn-dark">GitHub</a>
<a id="linkedin" class="btn btn-dark">LinkedIn</a>
<a id="facebook" class="btn btn-dark">Facebook</a>
<button id="resumeBtn" class="btn btn-primary">Download Resume</button>
</div>
</div><div class="col-lg-5 text-center reveal">
<img src="resources/images/profile.jpg" class="img-fluid hero-photo" onerror="this.src='resources/images/profile.png'">
</div></div>
</div>
</section><section class="container py-5 reveal">
<h2>About Me</h2>
<div id="about"></div>
</section><section class="container py-5 reveal">
<h2>Experience</h2>
<div id="exp" class="timeline"></div>
</section><section class="container py-5 reveal">
<h2>Skills</h2>
<div id="skillsWrap"></div>
</section><section class="container py-5 reveal">
<h2>Accomplishments</h2>
<div id="acc" class="row g-3"></div>
</section><section id="contact" class="container py-5 reveal">
<div class="p-5 rounded-5 bg-light">
<h2>Contact</h2>
<div id="contactText"></div>
<div id="contacts" class="row g-3 mt-3"></div>
</div>
</section><footer class="py-4 text-center text-muted">© 2026 Reymark Aguila</footer><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script>
let pdata=null;

function icon(skill){
  let s=skill.toLowerCase();
  if(s.includes('html'))return '🌐';
  if(s.includes('css'))return '🎨';
  if(s.includes('js'))return '⚡';
  if(s.includes('bootstrap'))return '🅱️';
  if(s.includes('.net'))return '⚙️';
  if(s.includes('sql'))return '🗄️';
  if(s.includes('azure'))return '☁️';
  return '•';
}

fetch('resources/data.json').then(r=>r.json()).then(d=>{
  pdata=d;

  brand.textContent=d.name;
  name.textContent=d.name;
  role.textContent=d.role;

  aboutTop.innerHTML=d.about;
  document.getElementById('about').innerHTML=d.about;

  github.href=d.github;
  linkedin.href=d.linkedin;
  facebook.href=d.facebook;

  contactText.innerHTML=d.contactDes||'';

  exp.innerHTML=d.experience.map((x,i)=>`
    <div class="item">
      <div class="row g-3 align-items-center">
        <div class="col-md-2">
          <img class="exp-logo" src="resources/images/experience/${i+1}.jpg" onerror="this.style.display='none'">
        </div>
        <div class="col-md-10">
          <h5>${x.role}</h5>
          <div class="fw-semibold">${x.company}</div>
          <small class="text-muted">${x.dtStart} - ${x.dtEnd}</small>
          <div>${x.loc}</div>
        </div>
      </div>
    </div>
  `).join('');

  skillsWrap.innerHTML=d.skills.map(s=>`<span class="skill">${icon(s)} ${s}</span>`).join('');

  acc.innerHTML=(d.accomplishments||[]).map((a,i)=>`
    <div class="col-md-6 col-lg-4">
      <div class="card p-3 h-100">
        <img class="acc-thumb mb-2" src="resources/images/accomplishments/${i+1}.jpg" onerror="this.style.display='none'">
        <h6 class="fw-bold">${a.title}</h6>
        <p class="text-muted mb-0">${a.description}</p>
      </div>
    </div>
  `).join('');

  contacts.innerHTML=d.contactInfo.map(c=>`
    <div class="col-md-4">
      <a href="${c.link}" class="text-decoration-none">
        <div class="card contact-card p-3 text-center">
          ${c.contact}
        </div>
      </a>
    </div>
  `).join('');
});

// Resume PDF (print)
document.getElementById('resumeBtn').onclick=function(){
  if(!pdata)return;

  const exp=pdata.experience.map(x=>`
    <p><b>${x.role}</b><br>${x.company}<br>${x.dtStart} - ${x.dtEnd}<br>${x.loc}</p>
  `).join('');

  const contacts=pdata.contactInfo.map(c=>c.contact).join('<br>');

  const w=window.open('','_blank');
  w.document.write(`
  <html>
  <head><title>Resume</title></head>
  <body style="font-family:Arial;padding:30px">
    <h1>${pdata.name}</h1>
    <h3>${pdata.role}</h3>
    <p>${pdata.about}</p>
    <hr>
    <h2>Experience</h2>${exp}
    <hr>
    <h2>Skills</h2>${pdata.skills.join(', ')}
    <hr>
    <h2>Contact</h2>${contacts}
  </body>
  </html>
  `);

  w.document.close();
  setTimeout(()=>w.print(),700);
};

const io=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('show')),{threshold:.1});
document.querySelectorAll('.reveal').forEach(e=>io.observe(e));
</script></body>
</html>
